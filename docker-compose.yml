services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: civitas_vote
      POSTGRES_USER: civitas
      POSTGRES_PASSWORD: civitas_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres-data:
